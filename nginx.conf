# Events Nginx Configuration
# events.clawdchat.cn — AI-Native 活动系统
# 此文件会被 start.sh 复制到 /etc/nginx/conf.d/events.conf

upstream events_backend {
    server 127.0.0.1:8001;
}

upstream events_frontend {
    server 127.0.0.1:3001;
}

# HTTP -> HTTPS 重定向
server {
    listen 80;
    server_name events.clawdchat.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主站
server {
    listen 443 ssl http2;
    server_name events.clawdchat.cn;

    ssl_certificate /etc/letsencrypt/live/events.clawdchat.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/events.clawdchat.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    access_log /var/log/nginx/events-access.log;
    error_log /var/log/nginx/events-error.log;
    client_max_body_size 10M;

    # 后端 API
    location /api/ {
        proxy_pass http://events_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 后端：Skill 文件、API 文档、健康检查
    location ~ ^/(docs|redoc|openapi\.json|health|skill\.md|staff-skill\.md|api-docs)(/.*)?$ {
        proxy_pass http://events_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 前端路由
    location / {
        proxy_pass http://events_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Next.js 静态资源 (hash 化文件名，浏览器缓存即可，无需 nginx proxy_cache)
    location /_next/static/ {
        proxy_pass http://events_frontend;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /nginx-health {
        access_log off;
        return 200 "events healthy\n";
        add_header Content-Type text/plain;
    }
}
